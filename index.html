<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  
  <!-- Cache busting meta tags to prevent GitHub Pages from heavily caching index.html -->
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="enchanment_game">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>enchanment_game</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    // ВЕРСИЯ ИГРЫ: Изменяйте это значение при каждом обновлении игры (например: "1.0.1", "1.0.2")
    // Это заставит браузер очистить кэш старых файлов игры, НЕ затрагивая сохранения игрока!
    var appVersion = "1.0.1"; 
    var currentVersion = localStorage.getItem('appVersion');

    if (currentVersion !== appVersion) {
      console.log("New version detected! Clearing old game cache...");
      
      var clearPromises = [];

      // 1. Очищаем кэш ресурсов (Service Worker Cache)
      if ('caches' in window) {
        clearPromises.push(
          caches.keys().then(function(names) {
            return Promise.all(names.map(function(name) {
              return caches.delete(name);
            }));
          })
        );
      }

      // 2. Отменяем регистрацию старых Service Worker'ов
      if ('serviceWorker' in navigator) {
        clearPromises.push(
          navigator.serviceWorker.getRegistrations().then(function(registrations) {
            return Promise.all(registrations.map(function(registration) {
              return registration.unregister();
            }));
          })
        );
      }

      // 3. Дожидаемся очистки, сохраняем новую версию и перезагружаем страницу
      Promise.all(clearPromises).then(function() {
        localStorage.setItem('appVersion', appVersion);
        window.location.reload(true);
      }).catch(function(e) {
        console.error("Error clearing cache: ", e);
        localStorage.setItem('appVersion', appVersion);
        window.location.reload(true);
      });
    } else {
      // Версия совпадает, загружаем загрузчик Flutter с обходом HTTP-кэша браузера
      var script = document.createElement("script");
      script.src = "flutter_bootstrap.js?v=" + appVersion;
      script.async = true;
      document.body.appendChild(script);
    }
  </script>
</body>
</html>
